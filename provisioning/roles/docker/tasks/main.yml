---
- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
    state: present
    update_cache: yes
    
- name: Remove Docker repository
  file:
    path: "{{ item }}"
    state: absent
  ignore_errors: yes
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/keyrings/docker.asc

- name: Add GPG key
  apt_key:
    url: https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }}/gpg
    state: present

- name: Verify fingerprint
  apt_key:
    id: 0EBFCD88
    state: present

- name: Set up the repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }} {{ ansible_facts["distribution_release"] }} stable
    state: present
    filename: docker
    update_cache: yes

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-compose-plugin
    state: present
    update_cache: yes
  notify: Start docker on boot

- name: Docker configuration
  copy:
    src: files/daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: 0644
  notify: Reload docker

- name: Set periodic Docker prune
  cron:
    name: docker-prune
    job: 'docker system prune -af --filter until=720h'
    minute: '0'
    hour: '1'

- name: Remove useless packages
  apt:
    autoclean: yes

- name: Remove useless dependencies
  apt:
    autoremove: yes
